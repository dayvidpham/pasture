name: Release

# Tag-on-merge: when a version bump lands on main (plugin.json version changes),
# create the v<version> tag on that exact merged commit, then build + publish —
# all in ONE run, so there is no fragile cross-workflow trigger to rely on.
#
# Flow: `pasture-release <bump> --no-tag` on a branch -> PR -> merge -> this runs.
#
# Requires two repo secrets for the tag push (a GitHub App, preferred):
#   RELEASE_APP_ID           — the App's ID
#   RELEASE_APP_PRIVATE_KEY  — the App's private key (PEM)
# The App needs Contents: write on this repo. Using an App token (not the default
# GITHUB_TOKEN) means the tag is created under a real bot identity, fires any other
# tag-watchers, and works if you later add tag-ref protection. A fine-grained PAT
# stored as a secret works too — swap the create-github-app-token step for one that
# sets GH_TOKEN from secrets.RELEASE_TOKEN.

on:
  push:
    branches: [main]
    paths: ['.claude-plugin/plugin.json']
  workflow_dispatch: {}   # manual re-release of the current main version

jobs:
  detect:
    name: Detect version bump + tag
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # HEAD + parent, to diff the version
          # Don't persist the default GITHUB_TOKEN as a git credential — its
          # http.extraheader would override the App token in the tag-push URL
          # below (causing a 403 as github-actions[bot]). With this false, the
          # App token minted next is the only credential used for the push.
          persist-credentials: false

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Detect bump and push tag
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          new="$(jq -r .version .claude-plugin/plugin.json)"
          echo "version=$new" >> "$GITHUB_OUTPUT"

          # Already released? Nothing to do (idempotent / safe re-runs).
          if git rev-parse "v$new" >/dev/null 2>&1 \
             || git ls-remote --tags origin "refs/tags/v$new" | grep -q .; then
            echo "v$new already tagged — skipping"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On push: only release if the version actually changed vs the parent.
          # On manual dispatch: release whenever the tag is missing.
          changed=true
          if [ "${{ github.event_name }}" = "push" ] && git rev-parse HEAD~1 >/dev/null 2>&1; then
            old="$(git show HEAD~1:.claude-plugin/plugin.json | jq -r .version 2>/dev/null || echo '')"
            [ "$new" = "$old" ] && changed=false
          fi

          if [ "$changed" != "true" ]; then
            echo "version unchanged ($new) — skipping"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name  "pasture-release[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$new" -m "Release v$new"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "v$new"
          echo "tagged v$new on $(git rev-parse --short HEAD)"
          echo "released=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.suffix }}
    needs: detect
    if: needs.detect.outputs.released == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build static binaries
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          TAG="v${{ needs.detect.outputs.version }}"
          LDFLAGS="-s -w -X main.version=${TAG}"
          for cmd in pastured pasture pasture-release; do
            go build -ldflags "${LDFLAGS}" -o "${cmd}-${{ matrix.suffix }}" ./cmd/${cmd}
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: '*-${{ matrix.suffix }}'
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          files: |
            pastured-*
            pasture-*
            pasture-release-*
          generate_release_notes: true
          fail_on_unmatched_files: true
