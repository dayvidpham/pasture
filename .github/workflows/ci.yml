name: CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build — pastured
        env:
          CGO_ENABLED: "0"
        run: go build ./cmd/pastured

      - name: Build — pasture
        env:
          CGO_ENABLED: "0"
        run: go build ./cmd/pasture

      - name: Build — pasture-release
        env:
          CGO_ENABLED: "0"
        run: go build ./cmd/pasture-release

      - name: Build — all (CGO_ENABLED=0)
        env:
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # CGO_ENABLED=0 enforces pure-Go build; -race requires CGo so it is
        # omitted here. Use a separate job with CGO_ENABLED=1 if race
        # detection is needed against a CGo-capable runner.
        env:
          CGO_ENABLED: "0"
        run: go test ./...

      - name: Recovery tests
        env:
          CGO_ENABLED: "0"
        run: make test-recovery

  race:
    name: Race Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Race detector
        env:
          CGO_ENABLED: "1"
        run: make test-race-ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "The following files need formatting:"
            echo "$files"
            exit 1
          fi

  codegen-drift:
    name: Codegen Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Regenerate
        run: make generate

      - name: Verify committed files match codegen output
        # Catches generated files (schema.xml, skills/**/SKILL.md, agents/*.md,
        # .opencode/**, opencode.json) that were hand-edited or left stale after
        # a change to internal/codegen. git status --porcelain also catches newly
        # generated files that were never committed, which git diff alone would
        # miss.
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are stale — run 'make generate' and commit the result."
            git status --porcelain
            git diff
            exit 1
          fi
