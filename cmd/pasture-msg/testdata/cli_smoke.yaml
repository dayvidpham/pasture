# CLI smoke tests for pasture-msg.
# Each case is run as a subprocess via exec.Command.
# Fields:
#   name:     human-readable test case label
#   args:     command-line arguments to pass to pasture-msg
#   want_exit: expected exit code (0 = success, non-zero = error)
#   want_stdout_contains: substring that must appear in stdout (optional)
#   want_stderr_contains: substring that must appear in stderr (optional)
cases:
  # Root --help: must exit 0 and explain that no Temporal server is needed.
  - name: root --help
    args: ["--help"]
    want_exit: 0
    want_stdout_contains: "pasture-msg"

  # Root --version: must exit 0.
  - name: root --version
    args: ["--version"]
    want_exit: 0
    want_stdout_contains: "v0.1.0"

  # Unknown subcommand: cobra exits 1 and prints usage/error.
  - name: unknown subcommand
    args: ["doesnotexist"]
    want_exit: 1

  # epoch --help: subcommand group help, exit 0.
  - name: epoch --help
    args: ["epoch", "--help"]
    want_exit: 0
    want_stdout_contains: "epoch"

  # signal --help: subcommand group help, exit 0.
  - name: signal --help
    args: ["signal", "--help"]
    want_exit: 0
    want_stdout_contains: "signal"

  # query --help: subcommand group help, exit 0.
  - name: query --help
    args: ["query", "--help"]
    want_exit: 0
    want_stdout_contains: "query"

  # phase --help: subcommand group help, exit 0.
  - name: phase --help
    args: ["phase", "--help"]
    want_exit: 0
    want_stdout_contains: "phase"

  # session --help: subcommand group help, exit 0.
  - name: session --help
    args: ["session", "--help"]
    want_exit: 0
    want_stdout_contains: "session"

  # epoch start --help: leaf command help, exit 0.
  - name: epoch start --help
    args: ["epoch", "start", "--help"]
    want_exit: 0
    want_stdout_contains: "epoch-id"

  # epoch cancel --help: leaf command help, exit 0.
  - name: epoch cancel --help
    args: ["epoch", "cancel", "--help"]
    want_exit: 0
    want_stdout_contains: "epoch-id"

  # epoch terminate --help: leaf command help, exit 0.
  - name: epoch terminate --help
    args: ["epoch", "terminate", "--help"]
    want_exit: 0
    want_stdout_contains: "epoch-id"

  # signal vote --help: leaf command help, exit 0.
  - name: signal vote --help
    args: ["signal", "vote", "--help"]
    want_exit: 0
    want_stdout_contains: "axis"

  # signal complete --help: leaf command help, exit 0.
  - name: signal complete --help
    args: ["signal", "complete", "--help"]
    want_exit: 0
    want_stdout_contains: "slice-id"

  # query state --help: leaf command help, exit 0.
  - name: query state --help
    args: ["query", "state", "--help"]
    want_exit: 0
    want_stdout_contains: "epoch-id"

  # phase advance --help: leaf command help, exit 0.
  - name: phase advance --help
    args: ["phase", "advance", "--help"]
    want_exit: 0
    want_stdout_contains: "to-phase"

  # session register --help: leaf command help, exit 0.
  - name: session register --help
    args: ["session", "register", "--help"]
    want_exit: 0
    want_stdout_contains: "session-id"

  # epoch start without required flags: validation error, exit 1.
  - name: epoch start missing epoch-id
    args: ["epoch", "start"]
    want_exit: 1
    want_stderr_contains: "epoch-id"

  # signal vote without required flags: validation error, exit 1.
  - name: signal vote missing flags
    args: ["signal", "vote"]
    want_exit: 1

  # phase advance with invalid phase name: validation error, exit 1.
  - name: phase advance invalid phase
    args: ["phase", "advance", "--epoch-id", "test-epoch", "--to-phase", "not-a-real-phase"]
    want_exit: 1

  # PROPOSAL-2 §11 Scenario 13 (S8 §7.12): epoch start with a malformed
  # --epoch-id (free string that fails provenance.ParseTaskID) is rejected
  # at the handler boundary BEFORE any signal/workflow start. Exit 1
  # (CategoryValidation). The CLI's printError calls StructuredError.Report
  # so the full diagnostic — including the plain-language Reason and the
  # numbered "How to fix" steps — appears on stderr. The substring
  # checked here is the "Error:" top line introduced by the Phase 11 R2
  # plain-language Stringer overhaul (b75e273 + c76f398).
  - name: epoch start malformed epoch-id rejected
    args: ["epoch", "start", "--epoch-id", "not-a-task-id"]
    want_exit: 1
    want_stderr_contains: "The epoch ID \"not-a-task-id\" is not valid."

  # PROPOSAL-2 §11 Scenario 13 (continued): the Fix substring on stderr
  # nudges the operator toward the canonical recovery flow. The legacy
  # "epoch-2026-04-22-mvp" shape is the canonical free-string example from
  # the proposal's Scenario 4 fixture description.
  - name: epoch start malformed epoch-id stderr has fix
    args: ["epoch", "start", "--epoch-id", "epoch-2026-04-22-mvp"]
    want_exit: 1
    want_stderr_contains: "pasture task create REQUEST"
