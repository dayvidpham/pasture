# Fixture for config_yaml_test.go.
#
# Each entry is a named test case loaded by LoadFixtures(t, testutil.ConfigLoading, &fixtures).
# Fields:
#   name:                human-readable test case label
#   yaml_content:        inline YAML written to a temp file
#   use_missing_path:    when true, pass a non-existent file path instead of yaml_content
#   want_error:          whether ResolvePasturedConfigFromFile should return a non-nil error
#   want_audit_trail:    expected PasturedConfig.AuditTrail
#   want_audit_db_path:  expected PasturedConfig.AuditDBPath

- name: malformed-yaml-returns-error
  yaml_content: "{{{"
  use_missing_path: false
  want_error: true
  want_audit_trail: sqlite
  want_audit_db_path: ""

- name: missing-file-returns-error
  yaml_content: ""
  use_missing_path: true
  want_error: true
  want_audit_trail: sqlite
  want_audit_db_path: ""

- name: pastured-yaml-loading
  yaml_content: |
    audit_trail: memory
    audit_db_path: /tmp/yaml-audit.db
  use_missing_path: false
  want_error: false
  want_audit_trail: memory
  want_audit_db_path: /tmp/yaml-audit.db
