cases:
  # ── Happy path ────────────────────────────────────────────────────────────

  - name: valid_markers_with_body
    description: |
      Both markers present in the correct order; hand-authored body below END.
      begin=1, end=3 (0-based indices).
    input: |
      # Title
      <!-- BEGIN GENERATED FROM pasture schema -->
      old generated content
      <!-- END GENERATED FROM pasture schema -->
      hand-authored body
    want_begin: 1
    want_end: 3
    want_error: ""

  - name: valid_markers_no_body
    description: |
      Both markers present; nothing after END. Still a valid document.
    input: |
      <!-- BEGIN GENERATED FROM pasture schema -->
      generated content here
      <!-- END GENERATED FROM pasture schema -->
    want_begin: 0
    want_end: 2
    want_error: ""

  - name: valid_markers_adjacent
    description: |
      BEGIN and END are adjacent (empty generated section). Valid.
    input: |
      <!-- BEGIN GENERATED FROM pasture schema -->
      <!-- END GENERATED FROM pasture schema -->
    want_begin: 0
    want_end: 1
    want_error: ""

  # ── Error cases ───────────────────────────────────────────────────────────

  - name: missing_both_markers
    description: No markers present at all.
    input: |
      no markers here
      just plain text
    want_error: "missing both"

  - name: missing_begin
    description: END is present but BEGIN is absent.
    input: |
      <!-- END GENERATED FROM pasture schema -->
      some body text
    want_error: "missing BEGIN"

  - name: missing_end
    description: BEGIN is present but END is absent.
    input: |
      # Heading
      <!-- BEGIN GENERATED FROM pasture schema -->
      some generated content
    want_error: "missing END"

  - name: duplicate_begin
    description: BEGIN appears twice; END appears once.
    input: |
      <!-- BEGIN GENERATED FROM pasture schema -->
      <!-- BEGIN GENERATED FROM pasture schema -->
      <!-- END GENERATED FROM pasture schema -->
    want_error: "duplicate BEGIN"

  - name: duplicate_end
    description: BEGIN appears once; END appears twice.
    input: |
      <!-- BEGIN GENERATED FROM pasture schema -->
      <!-- END GENERATED FROM pasture schema -->
      <!-- END GENERATED FROM pasture schema -->
    want_error: "duplicate END"

  - name: reversed_markers
    description: END appears before BEGIN (markers in wrong order).
    input: |
      <!-- END GENERATED FROM pasture schema -->
      some content
      <!-- BEGIN GENERATED FROM pasture schema -->
    want_error: "END marker"
