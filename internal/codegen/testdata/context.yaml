# Fixtures for context_test.go — context injection constraint set assertions.
#
# role_constraint_checks: verifies that GetRoleContext returns the expected
#   constraint IDs for each named role.
#
# phase_constraint_checks: verifies that GetPhaseContext returns the expected
#   labels and constraint IDs for each named phase.

role_constraint_checks:
  - role: supervisor
    exact_count: 18
    must_contain:
      - C-supervisor-no-impl
      - C-vertical-slices
      - C-review-consensus
      - C-audit-never-delete  # general
      - C-audit-dep-chain     # general
      - C-dep-direction        # general
      - C-frontmatter-refs     # general
      - C-actionable-errors    # general
      - C-agent-commit
      - C-followup-timing
      - C-followup-lifecycle
      - C-followup-leaf-adoption
      - C-slice-leaf-tasks
      - C-handoff-skill-invocation
      - C-supervisor-explore-ephemeral
      - C-integration-points
      - C-slice-review-before-close
      - C-max-review-cycles
    must_not_contain:
      - C-review-binary        # reviewer only
      - C-proposal-naming      # architect only
      - C-ure-verbatim         # architect only
      - C-worker-gates         # worker only

  - role: reviewer
    exact_count: 11
    must_contain:
      - C-review-binary
      - C-severity-eager
      - C-review-consensus
      - C-audit-never-delete   # general
      - C-audit-dep-chain      # general
      - C-dep-direction         # general
      - C-frontmatter-refs      # general
      - C-actionable-errors     # general
      - C-severity-not-plan
      - C-blocker-dual-parent
      - C-review-naming
    must_not_contain:
      - C-supervisor-no-impl
      - C-vertical-slices
      - C-proposal-naming
      - C-ure-verbatim
      - C-worker-gates
      - C-agent-commit

  - role: worker
    exact_count: 7
    must_contain:
      - C-worker-gates
      - C-agent-commit
      - C-audit-never-delete   # general
      - C-audit-dep-chain      # general
      - C-dep-direction         # general
      - C-frontmatter-refs      # general
      - C-actionable-errors     # general
    must_not_contain:
      - C-supervisor-no-impl
      - C-vertical-slices
      - C-review-binary
      - C-proposal-naming
      - C-ure-verbatim

  - role: architect
    exact_count: 9
    must_contain:
      - C-proposal-naming
      - C-ure-verbatim
      - C-handoff-skill-invocation
      - C-agent-commit
      - C-audit-never-delete   # general
      - C-audit-dep-chain      # general
      - C-dep-direction         # general
      - C-frontmatter-refs      # general
      - C-actionable-errors     # general
    must_not_contain:
      - C-supervisor-no-impl
      - C-vertical-slices
      - C-review-binary
      - C-severity-eager
      - C-worker-gates

  - role: epoch
    exact_count: 11
    must_contain:
      - C-review-consensus
      - C-handoff-skill-invocation
      - C-supervisor-explore-ephemeral
      - C-integration-points
      - C-slice-review-before-close
      - C-max-review-cycles
      - C-audit-never-delete   # general
      - C-audit-dep-chain      # general
      - C-dep-direction         # general
      - C-frontmatter-refs      # general
      - C-actionable-errors     # general
    must_not_contain:
      - C-worker-gates
      - C-proposal-naming
      - C-review-binary

