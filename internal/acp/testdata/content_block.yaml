tests:
  - id: "text-block"
    block: { type: "text", text: "hello from text block" }
    want_text: "hello from text block"
  - id: "empty-text"
    block: { type: "text", text: "" }
    want_text: ""
  - id: "thinking-block"
    block: { type: "thinking", text: "inner monologue" }
    want_text: "inner monologue"
  - id: "tool-use-block-no-text"
    block: { type: "tool_use", text: "" }
    want_text: ""
